defaults:
  - _self_

# shared experiment settings
main:
  model_path: "meta-llama/Llama-3.2-1B-instruct"
  languages: ["en_Latn", "deu_Latn", "fra_Latn", "spa_Latn", "pol_Latn", "slk_Latn", "jpn_Jpan", "cmn_Hani"]

pipeline:
  step1_tokenize:
    dataset_path: "HuggingFaceFW/fineweb-2"
    target_num_tokens: 1_000_000
    save_dir: "data/1_output"

  step2_record_activations:
    batch_size: 1
    chunk_size: 4096
    max_tokens: 4096 # -1 # means no limit
    mlp_activation_threshold: 0.0
    attn_activation_threshold: 0.0
    components:
      - mlp
      - attn
    recording_strategy: "grad_act"
    variant: "gate" 
    extend_load_dir_with_ex_name: true # Allow to load tokens exactly using tokenize.save_dir
    save_dir: "data/2_output"
    visualize:
      recording_strategy: "grad_act"
      save_dir: "data/2_output_visualization"

  step3_identify_neurons: # LAPE
    save_dir: "data/3_output"
    recorded_metric: "grad_average_activations" # options: "grad_average_activations", "over_threshold_rate"
    top_rate: 0.01 # Select only 1% of the neurons
    filter_rate: 0.1 # Minimum activation value to consider neuron

    filter_rate_by_strategy:
      grad_act: 0.1
      act: 0.1
    activation_bar_ratio: 0.95

  step4_identified_neurons_eval:
    selected_neurons_path: null # null -> uses data/3_output/<config_name>/lape_selected_neurons.pt
    save_dir: "data/4_output"
    tokenized_dir: null # null -> uses data/1_output/<config_name>
    eval_languages: null # null -> uses main.languages
    target_num_tokens: 131072
    seq_len: 1024
    batch_size: 1

  step5_generate_language_specific_model:
    selected_neurons_path: null # null -> uses data/3_output/<config_name>/lape_selected_neurons.pt
    save_dir: "data/5_output"
    extend_save_dir_with_ex_name: true
    save_tokenizer: true
    safe_serialization: true
    torch_dtype: null # null -> model default dtype, or set e.g. "float16" / "bfloat16"
