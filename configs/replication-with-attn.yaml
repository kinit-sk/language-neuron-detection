defaults:
  - _self_

# shared experiment settings
main:
  model_path: "meta-llama/Llama-3.2-1B-instruct"
  languages: ["deu_Latn", "fra_Latn", "spa_Latn", "pol_Latn", "slk_Latn", "jpn_Jpan", "cmn_Hani"]
  
## step 1 specific settings
identify_neurons: # identify neurons
  dataset_path: "HuggingFaceFW/fineweb-2"

  tokenize:
    target_num_tokens: 1_000_000
    save_dir: "data/1_output"

  record_activations:
    batch_size: 4
    chunk_size: 4096
    max_tokens: -1 # 4096 # -1 # means no limit
    mlp_activation_threshold: 0.0
    attn_activation_threshold: 0.4
    components:
      - mlp
      - attn
    recording_strategy: "act" # options: "act", "grad_act"
    variant: "gate" # options: "gate", "gate_up"
    save_dir: "data/2_output"

    visualize:
      recording_strategy: "grad_act" # options: "act", "grad_act"
      save_dir: "data/2_output_visualization"

  select_neurons: # LAPE
    save_dir: "data/3_output"
    recorded_metric: "over_threshold_rate" # options: "grad_average_activations", "over_threshold_rate"
    top_rate: 0.01 # Select only 1% of the neurons

    filter_rate_by_strategy:
      grad_act: 0.1
      act: 0.95
    activation_bar_ratio: 0.95

  evaluate_identified_neurons:
    selected_neurons_path: null # null -> uses data/3_output/<config_name>/lape_selected_neurons.pt
    save_dir: "data/4_output"
    tokenized_dir: null # null -> uses data/1_output/<config_name>
    eval_languages: null # null -> uses main.languages
    target_num_tokens: 131072
    seq_len: 1024
    batch_size: 1
